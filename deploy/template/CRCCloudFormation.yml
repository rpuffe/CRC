Parameters:
  env: 
    Type: String
    Description: Environment name for site.
  DomainName:
    Type: String
    Description: Domain name for site.
  HostedZoneId:
    Type: String
    Description: Hosted zone id for site.

Resources:
  
  ### S3 RESOURCES ###
  # s3 bucket for site
  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "crc-bucket-${env}"
      OwnershipControls:
           Rules:
                - ObjectOwnership: BucketOwnerPreferred
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
      - Key: Name
        Value: crc-bucket
      - Key: Environment
        Value: !Ref env

  MyBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyBucket
      PolicyDocument:
        Statement:
          - Action: s3:GetObject
            Effect: Allow
            Resource: 
              -  !Sub "${MyBucket.Arn}/*"
              -  !GetAtt MyBucket.Arn
            Principal: "*"

  # CloudFront distribution for redirecting to s3 bucket
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref DomainName
        Comment: CloudFront distribution for redirecting to S3 bucket
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: MyBucketOrigin
            DomainName: !GetAtt MyBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
        DefaultCacheBehavior:
          TargetOriginId: MyBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        PriceClass: PriceClass_100
        ViewerCertificate:
          AcmCertificateArn: !Ref Certificate
          SslSupportMethod: sni-only
        # Tags:
        #   - Key: Name
        #     Value: crc-cloudfront
        #   - Key: Environment
        #     Value: !Ref env

  # CloudFront origin access identity for s3 bucket
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "origin-access-identity for ${MyBucket}"

  # Certificate
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      ValidationMethod: DNS
      Tags:
        - Key: Name
          Value: crc-certificate
        - Key: Environment
          Value: !Ref env
  # DNSRecordValidate:
  #   Type: AWS::Route53::RecordSet
  #   Properties:
  #     HostedZoneId: !Ref HostedZoneId
  #     Name: !GetAtt Certificate.DomainValidationOptions.0.ResourceRecord.Name
  #     Type: !GetAtt Certificate.DomainValidationOptions.0.ResourceRecord.Type
  #     TTL: '300'
  #     ResourceRecords:
  #       - !GetAtt Certificate.DomainValidationOptions.0.ResourceRecord.value
  # Route53 record for site
  Route53Record:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}."
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  ## Deployment mechanism for site
  # CodeBuild project for site
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "crc-build-${env}"
      Description: !Sub "Build project for ${env}"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: S3
        Location: !Ref CodeBuildArtifactBucket
      Environment:
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        Type: LINUX_CONTAINER
        EnvironmentVariables:
          - Name: S3_BUCKET
            Value: !Ref MyBucket
          - Name: ENV
            Value: !Ref env
          - Name: CloudFrontDistribution
            Value: !Ref CloudFrontDistribution
      Source:
        Type: GITHUB
        Location: https://github.com/rpuffe/CRC.git
        BuildSpec: buildspec.yml
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: EVENT
              Pattern: PUSH,PULL_REQUEST_MERGED
            - Type: FILE_PATH
              Pattern: site/.
      SourceVersion: main
      Tags:
        - Key: Name
          Value: crc-build
        - Key: Environment
          Value: !Ref env
  # CodeBuild role for site
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "crc-build-role-${env}"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codebuild.amazonaws.com
            Action:
              - sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: !Sub "crc-build-policy-${env}"
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
              - Effect: Allow
                Action:
                  - s3:*
                Resource: 
                  - !Sub "arn:aws:s3:::${MyBucket}/*"
                  - !Sub "arn:aws:s3:::${MyBucket}"
                  - !Sub "arn:aws:s3:::${CodeBuildArtifactBucket}/*"
                  - !Sub "arn:aws:s3:::${CodeBuildArtifactBucket}"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: 
                  - !Sub "arn:aws:s3:::${MyBucket}"
                  - !Sub "arn:aws:s3:::${CodeBuildArtifactBucket}"
              - Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"
              - Effect: Allow
                Action:
                  - cloudfront:GetDistribution
                  - cloudfront:GetDistributionConfig
                  - cloudfront:UpdateDistribution
                Resource: "*"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess 
  
  # Codebuild Artifact s3 bucket for site
  CodeBuildArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "crc-build-artifact-${env}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
      - Key: Name
        Value: crc-build-artifact
      - Key: Environment
        Value: !Ref env

  ### VISITOR COUNTER RESOURCES ###
  
  # DynamoDB table for visitor count
  VisitorCountTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "crc-visitor-count-${env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Name
          Value: crc-visitor-count
        - Key: Environment
          Value: !Ref env

  # Lambda execution role
  VisitorCounterLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "crc-visitor-counter-role-${env}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "crc-visitor-counter-policy-${env}"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt VisitorCountTable.Arn

  # Lambda function for visitor counter
  VisitorCounterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "crc-visitor-counter-${env}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt VisitorCounterLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref VisitorCountTable
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from decimal import Decimal

          dynamodb = boto3.resource('dynamodb')
          table = dynamodb.Table(os.environ['TABLE_NAME'])

          def handler(event, context):
              try:
                  # Increment the visitor count atomically
                  response = table.update_item(
                      Key={'id': 'visitors'},
                      UpdateExpression='SET visit_count = if_not_exists(visit_count, :start) + :inc',
                      ExpressionAttributeValues={
                          ':inc': 1,
                          ':start': 0
                      },
                      ReturnValues='UPDATED_NEW'
                  )
                  
                  count = int(response['Attributes']['visit_count'])
                  
                  return {
                      'statusCode': 200,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*',
                          'Access-Control-Allow-Headers': 'Content-Type',
                          'Access-Control-Allow-Methods': 'GET, OPTIONS'
                      },
                      'body': json.dumps({'count': count})
                  }
              except Exception as e:
                  print(f"Error: {str(e)}")
                  return {
                      'statusCode': 500,
                      'headers': {
                          'Content-Type': 'application/json',
                          'Access-Control-Allow-Origin': '*'
                      },
                      'body': json.dumps({'error': 'Failed to update visitor count'})
                  }
      Tags:
        - Key: Name
          Value: crc-visitor-counter
        - Key: Environment
          Value: !Ref env

  # HTTP API Gateway
  VisitorCounterApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "crc-visitor-counter-api-${env}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Sub "https://${DomainName}"
          - "http://localhost:3000"
          - "http://localhost:5500"
          - "http://localhost:5173"
          - "http://localhost:8080"
          - "http://127.0.0.1:3000"
          - "http://127.0.0.1:5500"
          - "http://127.0.0.1:5173"
          - "http://127.0.0.1:8080"
        AllowMethods:
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type
      Tags:
        Name: crc-visitor-counter-api
        Environment: !Ref env

  # API Gateway integration with Lambda
  VisitorCounterApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref VisitorCounterApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt VisitorCounterFunction.Arn
      PayloadFormatVersion: '2.0'

  # API Gateway route
  VisitorCounterApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref VisitorCounterApi
      RouteKey: 'GET /counter'
      Target: !Sub "integrations/${VisitorCounterApiIntegration}"

  # API Gateway stage
  VisitorCounterApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref VisitorCounterApi
      StageName: '$default'
      AutoDeploy: true

  # Lambda permission for API Gateway
  VisitorCounterLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref VisitorCounterFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${VisitorCounterApi}/*"

Outputs:
  BucketName:
    Description: Name of the bucket
    Value: !Ref MyBucket
    Export:
      Name: !Sub "crc-bucket-${env}"
  BucketArn:
    Description: Arn of the bucket
    Value: !GetAtt MyBucket.Arn
    Export:
      Name: !Sub "crc-bucket-arn-${env}"
  VisitorCounterApiEndpoint:
    Description: API Gateway endpoint URL for visitor counter
    Value: !Sub "https://${VisitorCounterApi}.execute-api.${AWS::Region}.amazonaws.com/counter"
    Export:
      Name: !Sub "crc-visitor-counter-api-${env}"